name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    name: pyright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # pyright resolves types from the installed packages, so it needs the
      # backend dependencies present. Install them into ./.venv to match the
      # local setup that pyrightconfig.json points at.
      - name: Install Python dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Install pyright
        run: npm install

      - name: Type-check
        run: npm run typecheck
