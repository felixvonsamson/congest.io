<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>congest.io — Tutorial</title>
  <link rel="stylesheet" href="./styling.css">
  <style>
    #topLeftUI {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 1000;
    }
    #tutorialHelp {
      display: block;
    }
  </style>
</head>

<body>
  <script type="module" src="./tutorial.js"></script>

  <div id="app"></div>

  <div id="topLeftUI">
    <button id="skipTutorial" class="button blue">← Back to game</button>
  </div>

  <div id="tutorialHelp" class="ui-element"></div>

  <script>
    document.getElementById('skipTutorial').addEventListener('click', () => {
      window.location.href = '/';
    });
  </script>
</body>

</html>
